<h2>Olá, eu sou Júlia Acunha</h2>
<p>Sou psicóloga (CRP 14/11909), com atuação voltada ao atendimento de crianças e adolescentes. Atualmente sou pós-graduanda em Terapia Cognitivo-Comportamental na Infância e Adolescência e pós-graduanda em Neuropsicologia pela PUC Goiás.</p>
<p>Acredito que cada criança possui um ritmo único de desenvolvimento e que, com o suporte adequado, é possível atravessar fases difíceis com mais segurança, autoconhecimento e saúde emocional.</p>
<p>Meu trabalho é baseado em acolhimento, ciência e respeito à individualidade de cada criança.</p>

<h2>Como funciona o processo terapêutico?</h2>
<p>Um processo cuidadoso, acolhedor e construído junto com a família.</p>
<div class="timeline">
<div class="step"><div class="num">1</div><div><strong>Contato inicial</strong><p>Você envia uma mensagem pelo WhatsApp e marcamos a primeira conversa.</p></div></div>
<div class="step"><div class="num">2</div><div><strong>Conversa com os pais</strong><p>Conheço a história da criança, rotina familiar e as principais necessidades que motivaram a busca pela terapia.</p></div></div>
<div class="step"><div class="num">3</div><div><strong>Início das sessões</strong><p>As sessões acontecem de forma acolhedora, lúdica e adaptada à idade da criança.</p></div></div>
<div class="step"><div class="num">4</div><div><strong>Acompanhamento familiar</strong><p>Família e terapia caminham juntas durante todo o processo.</p></div></div>
</div>
</div>
</div>

<p>Atendimento presencial em Três Lagoas e online para famílias brasileiras em diferentes lugares. O processo terapêutico é adaptado à idade, à fase do desenvolvimento e às necessidades de cada criança ou adolescente.</p>

<section class="section added-care" id="tcc-orientacao-pais">
<div class="container">

<article class="added-info-card">
<span class="eyebrow">ABORDAGEM TERAPÊUTICA</span>
<h2>Como funciona a TCC?</h2>
<p>A Terapia Cognitivo-Comportamental (TCC) é uma abordagem baseada em evidências científicas que ajuda crianças e adolescentes a compreenderem melhor suas emoções, pensamentos e comportamentos.</p>
<p>As sessões são adaptadas à idade e às necessidades de cada paciente. Com as crianças, utilizo recursos lúdicos e temáticos, como jogos, histórias, desenhos e atividades interativas, tornando a terapia mais leve e significativa.</p>
<p>Além disso, os pais também fazem parte do processo por meio de orientações, favorecendo o desenvolvimento emocional e comportamental da criança dentro e fora da terapia.</p>
</article>
<article class="added-info-card dark">
<span class="eyebrow">FAMÍLIA E TERAPIA</span>
<h2>Orientação de Pais</h2>
<p>A orientação de pais faz parte do processo terapêutico e acontece em alguns momentos ao longo do acompanhamento, conforme as necessidades de cada criança ou adolescente.</p>
<p>Nesses encontros, conversamos sobre comportamentos, emoções, estabelecimento de limites e estratégias que podem ser aplicadas no dia a dia. O objetivo é ajudar a família a compreender melhor as dificuldades do filho e favorecer seu desenvolvimento emocional e comportamental.</p>
<p>Acredito que, quando família e terapia caminham juntas, os resultados tendem a ser mais consistentes e duradouros.</p>
</article>
</div>
</div>
</section>
<section class="section faq">

<details><summary>Psicóloga pode receitar medicamentos?</summary><p>Não. Psicólogos não prescrevem medicamentos. Quando necessário, pode haver encaminhamento para avaliação médica especializada.</p></details>
<details><summary>O atendimento online funciona para crianças?</summary><p>Sim, em alguns casos. A indicação depende da idade, demanda e condição da criança para participar do processo por videochamada.</p></details>
<details><summary>Qual o valor da sessão?</summary><p>Os valores e disponibilidade de horários são informados diretamente pelo WhatsApp.</p></details>
<details><summary>Como agendar a primeira sessão?</summary><p>Basta clicar em qualquer botão de WhatsApp da página e enviar uma mensagem para iniciar a conversa.</p></details>
<details><summary>Você atende por convênio?</summary><p>Atendo somente de forma particular. Caso o seu plano de saúde ofereça reembolso para atendimento psicológico, forneço recibo para que você possa solicitar o reembolso diretamente ao convênio, conforme as regras do seu plano.</p></details>
<details><summary>Qual idade você atende?</summary><p>Atendimento presencial para crianças a partir dos 5 anos e online a partir dos 6 anos, conforme avaliação inicial.</p></details>
